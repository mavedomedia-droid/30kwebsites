<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

const C = {
  navy: "#0A1547", navySoft: "#142158", cream: "#F5F1E8", lime: "#C8E84A",
  peri: "#A8C8FF", periDeep: "#7BA3E8", red: "#E63946", ink: "#08091F"
};
const FONT_DISPLAY = "'Bricolage Grotesque', system-ui, sans-serif";
const FONT_BODY = "'Geist', system-ui, sans-serif";
const FONT_MONO = "'JetBrains Mono', ui-monospace, monospace";

// Your actual Google Apps Script web app URL
const GAS_ENDPOINT = "https://script.google.com/macros/s/AKfycbyfmKByZPm0NDAUn4FyjAgFWCi0w0U41WYvyMmvXJTcp7qwK9T7pML-L__n8WIMxOUc/exec";

const ArrowUpRight = (props) => (
  <svg xmlns="http://www.w3.org/2000/svg" width={props.size||16} height={props.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/>
  </svg>
);
const CheckIcon = (props) => (
  <svg xmlns="http://www.w3.org/2000/svg" width={props.size||16} height={props.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="20 6 9 17 4 12"/>
  </svg>
);
const ExternalLink = (props) => (
  <svg xmlns="http://www.w3.org/2000/svg" width={props.size||16} height={props.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
  </svg>
);
const X = (props) => (
  <svg xmlns="http://www.w3.org/2000/svg" width={props.size||16} height={props.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
  </svg>
);
const Loader = (props) => (
  <svg xmlns="http://www.w3.org/2000/svg" width={props.size||16} height={props.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin">
    <line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>
  </svg>
);

const ArrowPattern = ({ opacity=0.05 }) => (
  <svg aria-hidden="true" width="100%" height="100%" style={{ position:"absolute", inset:0, pointerEvents:"none" }}>
    <defs>
      <pattern id="ap" x="0" y="0" width="56" height="56" patternUnits="userSpaceOnUse">
        <g stroke={C.peri} strokeWidth="1.3" fill="none" opacity={opacity} transform="translate(18 18)">
          <path d="M0 18 L18 0"/><path d="M10 0 L18 0 L18 8"/>
        </g>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#ap)"/>
  </svg>
);

const Logo = () => (
  <div className="flex items-center gap-1.5">
    <span style={{ fontFamily:FONT_DISPLAY, fontSize:"1.6rem", color:C.cream, fontWeight:700, letterSpacing:"-0.03em" }}>30K</span>
    <span style={{ fontFamily:FONT_MONO, fontSize:"10px", color:C.lime, fontWeight:700, letterSpacing:"0.2em" }}>WEBSITES</span>
  </div>
);

const SectionLabel = ({ children, color=C.peri }) => (
  <div className="inline-flex items-center gap-2 text-[10px] tracking-[0.25em] font-semibold mb-3" style={{ fontFamily:FONT_MONO, color }}>
    <span className="inline-block w-4 h-px" style={{ background:color }}/> {children}
  </div>
);

const SlotsBadge = ({ slotsLeft=3, total=10 }) => (
  <div className="inline-flex items-center gap-2 px-3 py-1 border" style={{ borderColor:`${C.lime}66`, background:`${C.lime}11` }}>
    <span className="w-2 h-2 rounded-full animate-pulse" style={{ background:C.lime }}/>
    <span style={{ fontFamily:FONT_MONO, fontSize:"11px", fontWeight:600, color:C.lime }}>{slotsLeft}/{total} SLOTS LEFT</span>
  </div>
);

const CTAButton = ({ label, outline, onClick }) => (
  <button onClick={onClick}
    className="inline-flex items-center gap-2 px-5 py-2.5 font-bold text-[12.5px] tracking-[0.1em] transition-colors"
    style={{
      background: outline ? 'transparent' : C.cream,
      color: outline ? C.cream : C.ink,
      border: outline ? `1px solid ${C.cream}55` : 'none',
      fontFamily: FONT_DISPLAY
    }}
    onMouseEnter={(e) => {
      if (outline) e.currentTarget.style.borderColor = C.cream;
      else e.currentTarget.style.background = C.lime;
    }}
    onMouseLeave={(e) => {
      if (outline) e.currentTarget.style.borderColor = `${C.cream}55`;
      else e.currentTarget.style.background = C.cream;
    }}>
    {label} <ArrowUpRight size={15}/>
  </button>
);

/* ---------- MODAL ---------- */
const Modal = ({ isOpen, onClose }) => {
  const [step, setStep] = useState("form");
  const [loading, setLoading] = useState(false);
  const [form, setForm] = useState({
    fullName:"", email:"", phone:"", creatorType:"", inspirationLinks:"",
    goals:[], contentTimeline:"", additionalNotes:"",
    addons:{ domain:false, email:false, pages:false, ads:false }
  });
  const [errors, setErrors] = useState({});

  const update = (field) => (e) => {
    setForm(s => ({ ...s, [field]: e.target.value }));
    if (errors[field]) setErrors(er => ({ ...er, [field]: undefined }));
  };
  const toggleGoal = (goal) => {
    setForm(s => ({
      ...s,
      goals: s.goals.includes(goal) ? s.goals.filter(g=>g!==goal) : [...s.goals, goal]
    }));
  };
  const toggleAddon = (addon) => {
    setForm(s => ({ ...s, addons: { ...s.addons, [addon]: !s.addons[addon] } }));
  };

  const validate = () => {
    const e = {};
    if(!form.fullName.trim()) e.fullName = "Required";
    if(!form.email.trim()) e.email = "Required";
    else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = "Enter a valid email";
    if(!form.phone.trim()) e.phone = "Required";
    if(!form.creatorType) e.creatorType = "Please select one";
    if(!form.contentTimeline) e.contentTimeline = "Please select an option";
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    if(!validate()) return;
    setLoading(true);
    const payload = {
      fullName: form.fullName, email: form.email, phone: form.phone,
      creatorType: form.creatorType, inspirationLinks: form.inspirationLinks,
      goals: form.goals.join(", "), contentTimeline: form.contentTimeline,
      additionalNotes: form.additionalNotes, addons: form.addons,
      timestamp: new Date().toISOString()
    };
    try {
      await fetch(GAS_ENDPOINT, {
        method:"POST",
        mode:"no-cors",
        headers:{"Content-Type":"text/plain;charset=utf-8"},
        body: JSON.stringify(payload)
      });
      if(window.dataLayer) window.dataLayer.push({ event:"website_inquiry", creatorType:form.creatorType });
      setStep("success");
    } catch(err) {
      console.error(err);
      setStep("success");
    } finally {
      setLoading(false);
    }
  };

  const closeAndReset = () => {
    setStep("form");
    setForm({ fullName:"", email:"", phone:"", creatorType:"", inspirationLinks:"", goals:[], contentTimeline:"", additionalNotes:"", addons:{ domain:false, email:false, pages:false, ads:false } });
    setErrors({});
    onClose();
  };

  if(!isOpen) return null;

  return (
    <div className="fixed inset-0 z-[100] flex items-center justify-center p-4" style={{ background:"rgba(8,9,31,0.85)" }} onClick={closeAndReset}>
      <div className="relative max-w-lg w-full bg-white max-h-[90vh] overflow-y-auto" style={{ fontFamily:FONT_BODY }} onClick={e => e.stopPropagation()}>
        <button onClick={closeAndReset} className="absolute top-3 right-3 p-1"><X size={18} color={C.ink}/></button>
        {step === "form" ? (
          <div className="p-6">
            <h3 className="text-xl font-bold mb-2" style={{ fontFamily:FONT_DISPLAY, color:C.ink }}>Get Your Website In 48 Hours</h3>
            <p className="text-[13.5px] mb-4" style={{ color:"#555" }}>Tell us a little about yourself and we'll get back to you.</p>
            <form onSubmit={handleSubmit} className="space-y-4" noValidate>
              <div>
                <label className="block text-[11px] font-semibold mb-1" style={{ fontFamily:FONT_MONO, color:C.ink }}>Full Name *</label>
                <input type="text" value={form.fullName} onChange={update("fullName")} className="w-full px-3 py-2 border text-[13.5px] text-black" style={{ borderColor: errors.fullName ? C.red : `${C.ink}33` }}/>
                {errors.fullName && <span className="text-xs" style={{ color:C.red }}>{errors.fullName}</span>}
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-[11px] font-semibold mb-1" style={{ fontFamily:FONT_MONO, color:C.ink }}>Email *</label>
                  <input type="email" value={form.email} onChange={update("email")} className="w-full px-3 py-2 border text-[13.5px] text-black" style={{ borderColor: errors.email ? C.red : `${C.ink}33` }}/>
                  {errors.email && <span className="text-xs" style={{ color:C.red }}>{errors.email}</span>}
                </div>
                <div>
                  <label className="block text-[11px] font-semibold mb-1" style={{ fontFamily:FONT_MONO, color:C.ink }}>Phone / WhatsApp *</label>
                  <input type="tel" value={form.phone} onChange={update("phone")} className="w-full px-3 py-2 border text-[13.5px] text-black" style={{ borderColor: errors.phone ? C.red : `${C.ink}33` }}/>
                  {errors.phone && <span className="text-xs" style={{ color:C.red }}>{errors.phone}</span>}
                </div>
              </div>
              <div>
                <label className="block text-[11px] font-semibold mb-1" style={{ fontFamily:FONT_MONO, color:C.ink }}>What best describes you? *</label>
                <select value={form.creatorType} onChange={update("creatorType")} className="w-full px-3 py-2 border text-[13.5px] text-black bg-white" style={{ borderColor: errors.creatorType ? C.red : `${C.ink}33` }}>
                  <option value="">Select...</option>
                  <option>Music Artist</option><option>Content Creator</option><option>Photographer</option><option>Videographer</option><option>DJ</option><option>Event Host / MC</option><option>Small Business</option><option>Personal Brand</option><option>Other</option>
                </select>
                {errors.creatorType && <span className="text-xs" style={{ color:C.red }}>{errors.creatorType}</span>}
              </div>
              <div>
                <label className="block text-[11px] font-semibold mb-1" style={{ fontFamily:FONT_MONO, color:C.ink }}>Do you have a website you like? (up to 3 links)</label>
                <textarea value={form.inspirationLinks} onChange={update("inspirationLinks")} rows={2} className="w-full px-3 py-2 border text-[13.5px] text-black" style={{ borderColor:`${C.ink}33` }} placeholder="Paste links for inspiration"/>
              </div>
              <div>
                <label className="block text-[11px] font-semibold mb-1" style={{ fontFamily:FONT_MONO, color:C.ink }}>What should your website help you do?</label>
                <div className="grid grid-cols-2 gap-1">
                  {["Showcase my work","Get bookings","Receive inquiries","Collect leads","Build my personal brand","Other"].map(goal => (
                    <label key={goal} className="flex items-center gap-2 text-[13px]" style={{cursor:"pointer"}}>
                      <input type="checkbox" checked={form.goals.includes(goal)} onChange={()=>toggleGoal(goal)}/> {goal}
                    </label>
                  ))}
                </div>
              </div>
              <div>
                <label className="block text-[11px] font-semibold mb-1" style={{ fontFamily:FONT_MONO, color:C.ink }}>How soon can you provide your content? *</label>
                <select value={form.contentTimeline} onChange={update("contentTimeline")} className="w-full px-3 py-2 border text-[13.5px] text-black bg-white" style={{ borderColor: errors.contentTimeline ? C.red : `${C.ink}33` }}>
                  <option value="">Select...</option>
                  <option>Today</option><option>Within 3 Days</option><option>Within 1 Week</option><option>Not Sure Yet</option>
                </select>
                {errors.contentTimeline && <span className="text-xs" style={{ color:C.red }}>{errors.contentTimeline}</span>}
                <p className="text-[11px] mt-1" style={{color:"#666"}}>We'll need a simple document containing your bio, links, photos, social media accounts and anything else you'd like included.</p>
              </div>
              <div>
                <label className="block text-[11px] font-semibold mb-1" style={{ fontFamily:FONT_MONO, color:C.ink }}>Anything else we should know?</label>
                <textarea value={form.additionalNotes} onChange={update("additionalNotes")} rows={2} className="w-full px-3 py-2 border text-[13.5px] text-black" style={{ borderColor:`${C.ink}33` }} placeholder="Specific colours, design direction, special requests..."/>
              </div>
              <div>
                <label className="block text-[11px] font-semibold mb-2" style={{ fontFamily:FONT_MONO, color:C.ink }}>Optional Add‑ons</label>
                <div className="space-y-2">
                  <div className="flex items-center gap-2">
                    <input type="checkbox" checked readOnly className="accent-black"/>
                    <span className="text-[13.5px] font-medium">30K Website — ₦30,000</span>
                    <span className="text-[11px]" style={{color:"#888"}}>(required)</span>
                  </div>
                  {[{id:"domain",label:"Custom Domain Setup",price:"₦30,000/year"},{id:"email",label:"Professional Email Setup",price:"₦30,000/year"},{id:"pages",label:"Additional Website Pages",price:"from ₦30,000"},{id:"ads",label:"Future Advertising Support",price:"Let's talk"}].map(opt => (
                    <label key={opt.id} className="flex items-center gap-2 cursor-pointer">
                      <input type="checkbox" checked={form.addons[opt.id]} onChange={()=>toggleAddon(opt.id)}/>
                      <span className="text-[13.5px]">{opt.label} — {opt.price}</span>
                    </label>
                  ))}
                </div>
              </div>
              <p className="text-[12px] italic" style={{color:"#666"}}>One revision round included after delivery. Clear content = better result.</p>
              <button type="submit" disabled={loading}
                className="w-full py-3 font-bold text-[13px] tracking-[0.1em] flex items-center justify-center gap-2 transition-colors"
                style={{ background:C.ink, color:C.cream, fontFamily:FONT_DISPLAY, opacity: loading ? 0.6 : 1 }}>
                {loading ? <><Loader size={14}/> SUBMITTING…</> : "GET MY WEBSITE"}
              </button>
              <p className="text-[11px] text-center" style={{color:"#999"}}>By submitting, you're letting us know you're interested. We'll review and get back to you with next steps.</p>
            </form>
          </div>
        ) : (
          <div className="p-6 text-center">
            <div className="w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-4" style={{ background:C.lime }}>
              <CheckIcon size={24} color={C.ink}/>
            </div>
            <h3 className="text-xl font-bold mb-2" style={{ fontFamily:FONT_DISPLAY, color:C.ink }}>Received! We'll be in touch.</h3>
            <p className="text-[13.5px] leading-relaxed" style={{ color:"#444" }}>Check your inbox for a confirmation email. If your slot is confirmed, we'll send next steps within 24 hours.</p>
            <button onClick={closeAndReset} className="mt-5 px-5 py-2 font-bold text-xs tracking-wider" style={{ background:C.ink, color:C.cream, fontFamily:FONT_DISPLAY }}>CLOSE</button>
          </div>
        )}
      </div>
    </div>
  );
};

/* ---------- SECTIONS ---------- */
const Hero = ({ openModal }) => {
  const features = ["Your Bio & Story","Photos & Videos","Music / Portfolio","All Your Social Links","Contact & Booking Forms","Fast, Mobile‑Ready, Done"];
  return (
    <section className="relative overflow-hidden" style={{ background:C.navy, color:C.cream }}>
      <ArrowPattern opacity={0.05}/>
      <div aria-hidden="true" className="absolute -top-40 -left-40 w-[450px] h-[450px] rounded-full pointer-events-none" style={{ background:`radial-gradient(circle, ${C.periDeep}22 0%, transparent 70%)`, filter:"blur(40px)" }}/>
      <div className="relative max-w-7xl mx-auto px-5 md:px-8 pt-5 pb-14 md:pt-6 md:pb-20">
        <nav className="flex items-center justify-between mb-8 md:mb-12">
          <Logo/><SlotsBadge/>
        </nav>
        <div className="text-center">
          <SectionLabel color={C.lime}>WHAT YOU'RE GETTING</SectionLabel>
          <div className="font-bold leading-[0.9] tracking-[-0.025em]" style={{ fontFamily:FONT_DISPLAY, fontSize:"clamp(2.75rem, 8vw, 5.5rem)" }}>
            The website you've been<br/>putting off. <span style={{ color:C.lime }}>Done.</span>
          </div>
          <p className="mt-4 md:mt-5 text-base md:text-lg max-w-xl mx-auto" style={{ color:C.peri, fontFamily:FONT_BODY }}>
            Built in 48 hours for ₦30,000. Send your content, get your site.
          </p>
          <div className="mt-8 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 max-w-4xl mx-auto">
            {features.map(feat => (
              <div key={feat} className="flex items-center gap-3 px-5 py-4 text-left" style={{ background:C.navySoft, border:`1px solid ${C.peri}22` }}>
                <CheckIcon size={18} color={C.lime}/>
                <span className="text-base font-semibold" style={{ fontFamily:FONT_DISPLAY }}>{feat}</span>
              </div>
            ))}
          </div>
          <div className="mt-8 flex flex-col items-center gap-4">
            <CTAButton label="GET MY WEBSITE" onClick={openModal}/>
            <SlotsBadge/>
          </div>
        </div>
      </div>
    </section>
  );
};

const AUDIENCE = ["Artists","Musicians","DJs","Photographers","Videographers","Creative Directors","Content Creators","Event Hosts","MCs","Influencers","Entrepreneurs","Small Business Owners"];

const WhoItsFor = () => (
  <section className="py-14 md:py-20" style={{ background:C.cream, color:C.ink }}>
    <div className="max-w-7xl mx-auto px-5 md:px-8">
      <div className="max-w-3xl mb-8">
        <SectionLabel color={C.navy}>WHO IT'S FOR</SectionLabel>
        <h2 className="text-3xl md:text-5xl font-bold leading-[0.95]" style={{ fontFamily:FONT_DISPLAY }}>
          Built for the creators<br/>building <span style={{ color:C.red }}>their future</span>.
        </h2>
      </div>
      <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
        {AUDIENCE.map(a => (
          <div key={a} className="group flex items-center justify-between px-4 py-3 cursor-default transition-colors" style={{ background:"white", border:`1px solid ${C.ink}22` }}
            onMouseEnter={(e)=>{ e.currentTarget.style.background=C.ink; e.currentTarget.style.color=C.cream; }}
            onMouseLeave={(e)=>{ e.currentTarget.style.background="white"; e.currentTarget.style.color=C.ink; }}>
            <span className="text-base font-bold" style={{ fontFamily:FONT_DISPLAY }}>{a}</span>
            <ArrowUpRight size={16}/>
          </div>
        ))}
      </div>
    </div>
  </section>
);

const HowItWorks = () => (
  <section className="py-14 md:py-20" style={{ background:C.navy, color:C.cream }}>
    <div className="max-w-5xl mx-auto px-5 md:px-8">
      <div className="text-center mb-10">
        <SectionLabel color={C.peri}>HOW IT WORKS</SectionLabel>
        <h2 className="text-3xl md:text-5xl font-bold leading-[0.95]" style={{ fontFamily:FONT_DISPLAY }}>Three steps. That's it.</h2>
      </div>
      <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
        {[{step:"01",title:"Reach Out",desc:"Fill the form with your content brief — bio, photos, videos, links, brand preferences."},{step:"02",title:"We Build",desc:"We design and build your one‑page site with best practices and tracking installed."},{step:"03",title:"Delivered",desc:"Within 48 hours your site goes live. You get the link and everything you need."}].map(s => (
          <div key={s.step} className="text-center p-6" style={{ background:C.navySoft, border:`1px solid ${C.peri}22` }}>
            <div className="text-4xl md:text-5xl font-bold mb-2" style={{ fontFamily:FONT_DISPLAY, color:C.lime }}>{s.step}</div>
            <div className="text-lg font-bold mb-1" style={{ fontFamily:FONT_DISPLAY }}>{s.title}</div>
            <p className="text-[13.5px] leading-relaxed" style={{ fontFamily:FONT_BODY, color:C.peri }}>{s.desc}</p>
          </div>
        ))}
      </div>
    </div>
  </section>
